name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Create reviews config
        run: |
          if [ -n "${GOOGLE_PLACES_API_KEY}" ]; then
            printf 'window.GOOGLE_API_KEY = %s;\n' "$(node -e 'process.stdout.write(JSON.stringify(process.env.GOOGLE_PLACES_API_KEY || ""))')" > js/config.js
          else
            printf 'window.GOOGLE_API_KEY = "";\n' > js/config.js
          fi
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
